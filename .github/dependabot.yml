version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next-platform:
        patterns:
          - next
          - "@next/*"
          - react
          - react-dom
      supabase:
        patterns:
          - "@supabase/*"
