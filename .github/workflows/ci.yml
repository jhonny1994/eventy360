name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-policy:
    name: Repo policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate monorepo layout
        run: pnpm check:repo

  supabase:
    name: Supabase checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.65.7

      - name: Validate Supabase project files
        shell: bash
        run: |
          set -euo pipefail
          test -f supabase/config.toml
          test -d supabase/migrations
          test -d supabase/functions
          supabase --version

  mobile:
    name: Mobile checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Generate localization files
        run: flutter pub run intl_utils:generate

      - name: Verify generated sources are committed
        shell: bash
        run: git diff --exit-code -- lib pubspec.lock

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
