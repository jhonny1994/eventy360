name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      supabase: ${{ steps.filter.outputs.supabase }}
      repo: ${{ steps.filter.outputs.repo }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        name: Classify changed files
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="$(git rev-parse HEAD~1 2>/dev/null || git hash-object -t tree /dev/null)"
          fi
          head="${{ github.sha }}"
          files="$(git diff --name-only "$base" "$head" || true)"

          web=false
          mobile=false
          supabase=false
          repo=false

          while IFS= read -r file; do
            case "$file" in
              apps/web/*) web=true ;;
              apps/mobile/*) mobile=true ;;
              supabase/*) supabase=true ;;
              .github/*|docs/*|README.md|.gitignore) repo=true ;;
            esac
          done <<< "$files"

          echo "web=$web" >> "$GITHUB_OUTPUT"
          echo "mobile=$mobile" >> "$GITHUB_OUTPUT"
          echo "supabase=$supabase" >> "$GITHUB_OUTPUT"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"

  repo-policy:
    name: Repo policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate monorepo layout
        run: pnpm check:repo

  web:
    name: Web checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.supabase == 'true' || needs.changes.outputs.repo == 'true'
    env:
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://eventy360.invalid' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-placeholder-anon-key' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm install:web

      - name: Lint
        run: pnpm lint:web

      - name: Typecheck
        run: pnpm typecheck:web

      - name: Build
        run: pnpm build:web

  supabase:
    name: Supabase checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.supabase == 'true' || needs.changes.outputs.repo == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.65.7

      - name: Validate Supabase project files
        shell: bash
        run: |
          set -euo pipefail
          test -f supabase/config.toml
          test -d supabase/migrations
          test -d supabase/functions
          supabase --version

  mobile:
    name: Mobile checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || needs.changes.outputs.repo == 'true'
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - id: mobile-project
        name: Detect Flutter project
        shell: bash
        run: |
          if [ -f pubspec.yaml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "apps/mobile is intentionally blank; skipping Flutter checks."
          fi

      - uses: subosito/flutter-action@v2
        if: steps.mobile-project.outputs.exists == 'true'
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        if: steps.mobile-project.outputs.exists == 'true'
        run: flutter pub get

      - name: Generate code
        if: steps.mobile-project.outputs.exists == 'true'
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Generate localization files
        if: steps.mobile-project.outputs.exists == 'true'
        run: flutter pub run intl_utils:generate

      - name: Verify generated sources are committed
        if: steps.mobile-project.outputs.exists == 'true'
        shell: bash
        run: git diff --exit-code -- lib pubspec.lock

      - name: Analyze
        if: steps.mobile-project.outputs.exists == 'true'
        run: flutter analyze

      - name: Test
        if: steps.mobile-project.outputs.exists == 'true'
        run: flutter test

  all-checks:
    name: Required checks
    runs-on: ubuntu-latest
    needs:
      - repo-policy
      - web
      - mobile
      - supabase
    if: always()
    steps:
      - name: Verify required jobs
        shell: bash
        run: |
          set -euo pipefail
          for result in "${{ needs.repo-policy.result }}" "${{ needs.web.result }}" "${{ needs.mobile.result }}" "${{ needs.supabase.result }}"; do
            case "$result" in
              success|skipped) ;;
              *) exit 1 ;;
            esac
          done
