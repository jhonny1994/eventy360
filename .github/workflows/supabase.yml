name: Supabase

on:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/supabase.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Supabase project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: 2.65.7

      - name: Validate project files
        shell: bash
        run: |
          set -euo pipefail
          test -f supabase/config.toml
          test -d supabase/migrations
          test -d supabase/functions
          supabase --version

  deploy:
    name: Deploy migrations
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: 2.65.7

      - name: Check deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}

      - name: Push database migrations
        run: supabase db push --linked --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        shell: bash
        run: |
          set -euo pipefail
          for dir in supabase/functions/*; do
            [ -d "$dir" ] || continue
            fn="$(basename "$dir")"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
