name: Mobile Release

on:
  push:
    tags:
      - "mobile-v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a GitHub Release from this run"
        required: false
        default: false
        type: boolean
      tag_name:
        description: "Tag name to use for a manually published release (for example
          mobile-v1.0.0)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Build Android release artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Flutter app exists
        shell: bash
        run: |
          set -euo pipefail
          test -f pubspec.yaml
          test -d lib

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Generate localization files
        run: flutter pub run intl_utils:generate

      - name: Verify generated sources are committed
        shell: bash
        run: git diff --exit-code -- lib pubspec.lock

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Set up release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] && [ -n "${ANDROID_KEY_ALIAS:-}" ] && [ -n "${ANDROID_KEY_PASSWORD:-}" ] && [ -n "${ANDROID_STORE_PASSWORD:-}" ]; then
            mkdir -p android/keystore
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore/eventy360-release.jks
            printf '%s\n' \
              'storeFile=keystore/eventy360-release.jks' \
              "storePassword=$ANDROID_STORE_PASSWORD" \
              "keyAlias=$ANDROID_KEY_ALIAS" \
              "keyPassword=$ANDROID_KEY_PASSWORD" \
              > android/key.properties
          else
            echo "Release signing secrets are not fully configured; build will fall back to debug signing."
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Generate checksum
        shell: bash
        run: |
          set -euo pipefail
          cd build/app/outputs/flutter-apk
          sha256sum app-release.apk | tee app-release.apk.sha256

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-release-${{ github.ref_name }}
          path: |
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk.sha256

      - name: Create GitHub release from tag
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk.sha256
          fail_on_unmatched_files: true

      - name: Create GitHub release from manual dispatch
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release &&
          inputs.tag_name != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          generate_release_notes: true
          files: |
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk.sha256
          fail_on_unmatched_files: true
