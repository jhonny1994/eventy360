name: Security

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/web/**"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - uses: github/codeql-action/analyze@v4
