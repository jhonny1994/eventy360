name: eventy360
description: "Eventy360 researcher mobile application."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.2
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.3
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.2.2
  intl: ^0.20.2
  json_annotation: ^4.11.0
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.10.4

dev_dependencies:
  build_runner: ^2.8.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  intl_utils: ^2.8.12
  json_serializable: ^6.11.1
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

flutter_intl:
  enabled: true
  class_name: S
  main_locale: en
  arb_dir: lib/l10n
  output_dir: lib/l10n/generated
